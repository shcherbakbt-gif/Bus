name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Prepare Web Directory
        run: |
          # Создаем папку www
          mkdir -p www
          
          # Ищем index.html (игнорируя регистр) и копируем его в www
          find . -maxdepth 2 -iname "index.html" -exec cp {} www/index.html \;
          
          # Копируем все остальные важные файлы
          cp *.json www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          
          # Проверяем, появился ли файл в нужной папке
          if [ ! -f "www/index.html" ]; then
            echo "ОШИБКА: Файл index.html не найден в репозитории!"
            exit 1
          fi
          ls -R www

      - name: Install Capacitor Dependencies
        run: |
          if [ ! -f package.json ]; then
            echo '{"name": "bus-app", "version": "1.0.0"}' > package.json
          fi
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor and Add Android
        run: |
          npx cap init "Bus Lernprogramm" "com.bus.app" --web-dir www
          npx cap add android

      - name: Copy Web Assets to Android
        run: npx cap copy android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bus-learning-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
