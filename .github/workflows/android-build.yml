name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor Dependencies
        run: |
          # Создаем package.json, если его нет
          if [ ! -f package.json ]; then
            echo '{"name": "bus-app", "version": "1.0.0"}' > package.json
          fi
          # Устанавливаем необходимые пакеты локально
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor and Add Android
        run: |
          npx cap init "Bus Lernprogramm" "com.bus.app" --web-dir .
          npx cap add android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bus-learning-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
