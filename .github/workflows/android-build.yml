name: Build Android APK
on:
  push:
    branches:
      - main  # Сборка запустится, когда вы загрузите файлы в ветку main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Install Dependencies
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          # Создаем базовый package.json, если его нет
          echo '{"name": "bus-app", "version": "1.0.0", "dependencies": {}}' > package.json

      - name: Initialize Capacitor
        run: |
          npx cap init "Bus Lernprogramm" "com.bus.app" --web-dir .
          npx cap add android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bus-learning-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
